<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAM2050 • Reviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="assets/styles.css" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-json"></script>
  </head>
  <body>
    <div hx-get="partials/header.html" hx-trigger="load"></div>

    <main class="container py-4 py-md-5">
      <section class="hero-card p-4 p-md-5 mb-4">
        <div class="row align-items-center g-4">
          <div class="col-lg-8">
            
            <h2 class="display-6 fw-bold" json-text="title">The Japanese artists I’ve been listening to lately.</h2>
            <p class="lead mb-0" json-text="intro">This is a small, modular archive of the artists, albums, and songs I keep returning to.</p>
          </div>
        </div>
      </section>

      <section class="page-section">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h3 class="h4 mb-1">Album reviews</h3>
            <p class="text-muted mb-0">Each card opens a specific anchor on the artist page.</p>
          </div>
        </div>
        <div hx-get="data/reviews.json" hx-trigger="load" hx-swap="json" hx-ext="json-swap">
          <div class="row g-4">
            <template json-each="cards">
              <div class="col-md-6 col-lg-4">
                <a @href="href" class="text-decoration-none text-dark d-block h-100">
                  <article class="card hover-card h-100">
                    <img @src="image" class="card-img-top" @alt="title" />
                    <div class="card-body">
                      <h4 class="h5 mb-1">${title}</h4>
                      <p class="text-muted mb-0">${subtitle}</p>
                    </div>
                    <div class="hover-overlay">
                      <span class="rating-stars">${rating}</span>
                      <span class="card-badge">${badge}</span>
                      <p class="small mb-0">${note}</p>
                    </div>
                  </article>
                </a>
              </div>
            </template>
          </div>
        </div>
      </section>
    </main>

    <footer class="container py-4 text-muted small">
      <p class="mb-0">Max Hicks • Listening Diary Website • FAM 2050 Final Project</p>
    </footer>
  </body>
</html>
