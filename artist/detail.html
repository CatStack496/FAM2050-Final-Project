<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAM2050 • Artist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  </head>
  <body>
    <div hx-get="../partials/header.html" hx-trigger="load"></div>

    <main class="container py-4 py-md-5">
      <section class="artist-hero card mb-4">
        <div class="row g-0">
          <div class="col-lg-4">
            <img id="artist-image" src="" alt="Artist portrait" />
          </div>
          <div class="col-lg-8">
            <div class="p-4 p-md-5 artist-details">
              <p class="text-uppercase small fw-semibold text-muted">Artist page</p>
              <h2 id="artist-name" class="display-6 fw-bold">Artist</h2>
              <p id="artist-lead" class="lead"></p>
              <ul>
                <li><strong>Formation:</strong> <span id="artist-formation"></span></li>
                <li><strong>Genres:</strong> <span id="artist-genres"></span></li>
                <li><strong>YouTube Music:</strong> <a id="artist-youtube" href="#" target="_blank" rel="noreferrer">Open channel</a></li>
                <li><strong>Notes:</strong> <span id="artist-notes"></span></li>
                <li><strong>Favorite album:</strong> <span id="artist-favorite"></span></li>
              </ul>
            </div>
          </div>
        </div>
      </section>

      <section class="page-section">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <h3 class="h4 mb-1">Albums</h3>
            <p class="text-muted mb-0">A short album list that mirrors the original notes.</p>
          </div>
        </div>
        <div id="albums-grid" class="row g-4 album-grid"></div>
      </section>

      <section class="page-section">
        <div class="row g-4">
          <div class="col-lg-6">
            <article class="card h-100">
              <div class="card-body">
                <h3 class="h5 mb-3">Top albums</h3>
                <ul id="top-albums-list" class="mb-0"></ul>
              </div>
            </article>
          </div>
          <div class="col-lg-6">
            <article class="card h-100">
              <div class="card-body">
                <h3 class="h5 mb-3">Favorite songs</h3>
                <ul id="favorite-songs-list" class="mb-0"></ul>
              </div>
            </article>
          </div>
        </div>
      </section>

      <section class="page-section" id="review-anchor">
        <article class="info-card p-4 p-md-5">
          <p class="text-uppercase small fw-semibold text-muted">Review anchor</p>
          <h3 id="review-title" class="h4 fw-bold"></h3>
          <p id="review-text"></p>
          <blockquote id="review-quote"></blockquote>
          <p id="extra-note" class="mt-3 mb-0 text-muted"></p>
        </article>
      </section>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('artist') || 'kangaroo';

      fetch('../data/artists.json')
        .then((response) => response.json())
        .then((data) => {
          const artist = data.artists.find((item) => item.slug === slug) || data.artists[0];
          document.title = `FAM2050 • ${artist.name}`;
          document.getElementById('artist-image').src = artist.image || '/assets/placeholder.png';
          document.getElementById('artist-image').alt = `${artist.name} portrait`;
          document.getElementById('artist-name').textContent = artist.name;
          document.getElementById('artist-lead').textContent = artist.lead || '';
          document.getElementById('artist-formation').textContent = artist.formation || '—';
          document.getElementById('artist-genres').textContent = artist.genres || '—';
          const youtubeLink = document.getElementById('artist-youtube');
          youtubeLink.href = artist.youtube || '#';
          youtubeLink.textContent = artist.youtube ? 'Open channel' : 'No link listed';
          document.getElementById('artist-notes').textContent = artist.notes || '—';
          document.getElementById('artist-favorite').textContent = `${artist.favoriteAlbum || '—'} • ${artist.favoriteSong || '—'}`;

          const albumsGrid = document.getElementById('albums-grid');
          albumsGrid.innerHTML = (artist.albums || [])
            .map(
              (album) => `
                <div class="col-md-6 col-lg-4">
                  <article class="card h-100">
                    <div class="card-body">
                      <h4 class="card-title">${album.title}</h4>
                      <p class="card-text">${album.description}</p>
                    </div>
                  </article>
                </div>
              `
            )
            .join('');

          const topAlbumsList = document.getElementById('top-albums-list');
          topAlbumsList.innerHTML = (artist.albums || [])
            .slice(0, 5)
            .map((album) => `<li>${album.title}</li>`)
            .join('');

          const favoriteSongsList = document.getElementById('favorite-songs-list');
          const favoriteSongs = (artist.favoriteSongs && artist.favoriteSongs.length > 0)
            ? artist.favoriteSongs
            : [artist.favoriteSong].filter(Boolean);
          favoriteSongsList.innerHTML = favoriteSongs.map((song) => `<li>${song}</li>`).join('');

          document.getElementById('review-title').textContent = artist.reviewTitle || 'Review';
          document.getElementById('review-text').textContent = artist.reviewText || '';
          document.getElementById('review-quote').textContent = artist.quote || '';
          document.getElementById('extra-note').textContent = artist.extraNote || '';
        });
    </script>
  </body>
</html>
