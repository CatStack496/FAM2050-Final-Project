<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FAM2050 • Artist Pages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../assets/styles.css" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-json"></script>
  </head>
  <body>
    <div hx-get="../partials/header.html" hx-trigger="load"></div>

    <main class="container py-4 py-md-5">
      <section class="hero-card p-4 p-md-5 mb-4">
        <h2 class="display-6 fw-bold" json-text="title">The artists behind the listening notes.</h2>
        <p class="lead mb-0" json-text="intro">This index gathers the artists into a simple gallery so the site feels like a complete archive instead of a set of disconnected pages.</p>
      </section>

      <section class="page-section">
        <div hx-get="../data/artists.json" hx-trigger="load" hx-swap="json" hx-ext="json-swap">
          <div class="row g-4">
            <template json-each="artists">
              <div class="col-sm-6 col-lg-4">
                <a @href="href" class="text-decoration-none text-dark d-block h-100">
                  <article class="card hover-card h-100">
                    <img @src="image" class="card-img-top" @alt="name" />
                    <div class="card-body">
                      <h3 class="h5 mb-1">${name}</h3>
                      <p class="text-muted mb-0">${genres}</p>
                    </div>
                    <div class="hover-overlay">
                      <span class="rating-stars">${rating}</span>
                      <p class="small mb-0">${note}</p>
                    </div>
                  </article>
                </a>
              </div>
            </template>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
